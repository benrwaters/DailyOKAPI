services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dailyok-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
      APP_ENV: local
      TZ: ${TZ:-Europe/London}
    ports:
      - "${APP_PORT:-8090}:80"
    volumes:
      - ./app:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: dailyok-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dailyok}
      MYSQL_USER: ${MYSQL_USER:-dailyok}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dailyok}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: ${TZ:-Europe/London}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/import:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: dailyok-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 256M
    ports:
      - "${PHPMYADMIN_PORT:-8091}:80"
    restart: unless-stopped
